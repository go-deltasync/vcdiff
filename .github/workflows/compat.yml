name: compat

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  compat:
    name: cross-impl compat (linux / xdelta3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23"
          check-latest: true

      # xdelta3 is the actively maintained reference VCDIFF (RFC 3284)
      # implementation (open-vcdiff is archived). It is packaged by Ubuntu, so
      # no source build is needed. Best-effort: a failure here leaves the job
      # green and the compat tests skip (the `xdelta3` binary is absent).
      - name: Install xdelta3
        continue-on-error: true
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y xdelta3
          xdelta3 -V 2>&1 | head -n 1 || true

      - name: Compat tests
        run: go test -v -tags=compat ./internal/vcdiff/...
