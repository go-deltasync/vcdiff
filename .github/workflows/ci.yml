name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Native runners: amd64 (ubuntu-latest) and arm64 (ubuntu-24.04-arm). These
  # run the full race-enabled test suite plus the org-wide 100% coverage gate on
  # internal/vcdiff, exactly as before.
  test:
    name: test (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,   arch: amd64 }
          - { os: ubuntu-24.04-arm, arch: arm64 }
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Show Go version
        run: go version

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        shell: bash
        run: |
          go test -race -coverprofile=cover.out ./...
          go tool cover -func=cover.out | tee cover.txt
          # The CLI in cmd/ is a thin wrapper around internal/vcdiff and has no
          # unit tests; we gate coverage on the library only, where the
          # format/algorithm-correctness logic lives. The threshold is 100%
          # (org-wide hard rule): every branch must be reachable from tests, or
          # the dead code is removed — the bar is never lowered.
          pkg_cov=$(go test -coverprofile=cover-pkg.out ./internal/vcdiff >/dev/null 2>&1 && \
                    go tool cover -func=cover-pkg.out | tail -n 1 | awk '{print $3}' | tr -d '%')
          echo "internal/vcdiff coverage: ${pkg_cov}%"
          awk -v t="$pkg_cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::internal/vcdiff coverage ${pkg_cov}% < 100%"; exit 1; }

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cover-${{ matrix.arch }}
          path: cover.out
          if-no-files-found: warn

  # Emulated runners: the remaining four 64-bit targets. vcdiff implements the
  # RFC 3284 / open-vcdiff wire format (varint-coded addresses, big-endian Adler32
  # checksum, binary window headers), so s390x (big-endian) is a genuine
  # format-correctness test, not a formality. We cross-compile a static
  # (CGO_ENABLED=0) test binary per package, then execute each under QEMU via
  # docker. The same 100% coverage gate is applied to internal/vcdiff.
  emulated:
    name: test (${{ matrix.arch }}, qemu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: riscv64
            goarch: riscv64
            image: debian:trixie
            qemu_cpu: "rv64,v=true,vlen=128"
          - arch: loong64
            goarch: loong64
            image: ghcr.io/loong64/debian:trixie
            qemu_cpu: la464
          - arch: ppc64le
            goarch: ppc64le
            image: debian:trixie
            qemu_cpu: power9
          - arch: s390x
            goarch: s390x
            image: debian:trixie
            qemu_cpu: qemu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true

      - name: Show Go version
        run: go version

      - name: Register QEMU (binfmt)
        run: docker run --privileged --rm tonistiigi/binfmt --install all

      - name: Vet
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go vet ./...

      - name: Build
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Cross-compile test binaries
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p testbins
          # One test binary per package that has tests; -cover instruments them so
          # we can recover the coverage profile after the emulated run.
          for pkg in $(go list ./...); do
            name=$(echo "$pkg" | tr '/' '_')
            if go test -c -cover -o "testbins/${name}.test" "$pkg" 2>/dev/null; then
              echo "built ${name}.test for $pkg"
            else
              echo "no tests in $pkg (skipped)"
            fi
          done
          ls -l testbins

      - name: Run test binaries under QEMU
        env:
          IMAGE: ${{ matrix.image }}
          QEMU_CPU: ${{ matrix.qemu_cpu }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          docker pull --platform "linux/${GOARCH}" "$IMAGE"
          fail=0
          for bin in testbins/*.test; do
            base=$(basename "$bin" .test)
            echo "=== running $base under linux/${GOARCH} (QEMU_CPU=${QEMU_CPU}) ==="
            prof="testbins/${base}.cover.out"
            docker run --rm --platform "linux/${GOARCH}" \
              -e QEMU_CPU="${QEMU_CPU}" \
              -v "$PWD/testbins:/t" -w /t "$IMAGE" \
              "./$(basename "$bin")" -test.v "-test.coverprofile=$(basename "$prof")" \
              || fail=1
          done
          exit $fail

      - name: Coverage gate (internal/vcdiff, 100%)
        run: |
          set -euo pipefail
          prof="testbins/github.com_go-deltasync_vcdiff_internal_vcdiff.cover.out"
          if [ ! -f "$prof" ]; then
            echo "::error::missing coverage profile for internal/vcdiff ($prof)"; exit 1
          fi
          # Same org-wide 100% threshold as the native job, applied to the profile
          # produced by the emulated internal/vcdiff test binary.
          pkg_cov=$(go tool cover -func="$prof" | tail -n 1 | awk '{print $3}' | tr -d '%')
          echo "internal/vcdiff coverage (${{ matrix.arch }}): ${pkg_cov}%"
          awk -v t="$pkg_cov" 'BEGIN { exit !(t+0 >= 100.0) }' || {
            echo "::error::internal/vcdiff coverage ${pkg_cov}% < 100%"; exit 1; }

      - name: Upload coverage profile
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cover-${{ matrix.arch }}
          path: testbins/*.cover.out
          if-no-files-found: warn
